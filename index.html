<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SelfTrack</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23000' width='192' height='192'/><text x='96' y='128' font-size='80' fill='white' text-anchor='middle' font-weight='bold'>S</text></svg>">
    <meta name="theme-color" content="#000">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- LOGIN -->
    <div id="loginScreen" class="screen active">
        <div class="login-container">
            <div class="logo">📸</div>
            <h1>SelfTrack</h1>
            <p>Photo à 5 moments aléatoires dans la journée</p>
            <button id="googleLoginBtn" class="btn-primary">Se connecter avec Google</button>
        </div>
    </div>

    <!-- MAIN -->
    <div id="mainScreen" class="screen">
        <div class="header">
            <div class="user-info">
                <img id="userPhoto" class="user-avatar" src="" alt="">
                <div>
                    <p id="userName" class="user-name"></p>
                    <p id="currentDate" class="user-date"></p>
                </div>
            </div>
            <button id="logoutBtn" class="btn-logout">Déconnexion</button>
        </div>

        <!-- HOME TAB -->
        <div id="homeTab" class="tab active">
            <div id="statusBox" class="status-box">
                <p id="statusText" class="status-text">En attente...</p>
                <p id="nextReminderText" class="next-reminder"></p>
            </div>

            <div class="photos-section">
                <h2>Vos photos aujourd'hui</h2>
                <div id="photosGrid" class="photos-grid">
                    <p class="empty-message">Aucune photo</p>
                </div>
            </div>
        </div>

        <!-- STORIES TAB -->
        <div id="storiesTab" class="tab">
            <div id="storiesContainer" class="stories-container" style="display:none;">
                <div class="story-header">
                    <img id="storyUserPhoto" class="story-avatar" src="" alt="">
                    <div class="story-user-info">
                        <p id="storyUserName" class="story-name"></p>
                        <p id="storyCounter" class="story-counter"></p>
                    </div>
                </div>

                <div class="story-image-container">
                    <img id="storyImage" class="story-image" src="" alt="">
                    <button id="storySwapBtn" class="story-swap-btn">📷</button>
                </div>

                <div class="story-navigation">
                    <button id="storiesPrev" class="story-nav-btn">← Précédent</button>
                    <button id="storiesNext" class="story-nav-btn">Suivant →</button>
                </div>
            </div>

            <div id="revealBox" class="reveal-box" style="display:none;">
                <h2>✨ Révélation 20h ✨</h2>
                <p>Découvre les photos de tes amis!</p>
            </div>
        </div>

        <!-- FRIENDS TAB -->
        <div id="friendsTab" class="tab">
            <div class="tab-content">
                <!-- SEARCH -->
                <div class="search-section">
                    <h2>Ajouter un ami</h2>
                    <div class="search-box">
                        <input type="email" id="friendEmailInput" placeholder="Email de ton ami" class="email-input">
                        <button id="searchFriendBtn" class="btn-primary">Chercher</button>
                    </div>
                    <div id="searchResultBox" class="search-result-box"></div>
                </div>

                <!-- INVITATIONS -->
                <div class="invitations-section">
                    <h2>Demandes en attente</h2>
                    <div id="invitationsList" class="invitations-list">
                        <p class="empty-message">Aucune invitation</p>
                    </div>
                </div>

                <!-- FRIENDS -->
                <div class="friends-section">
                    <h2>Tes amis</h2>
                    <div id="friendsList" class="friends-list">
                        <p class="empty-message">Aucun ami</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- MORE TAB -->
        <div id="moreTab" class="tab">
            <div class="tab-content">
                <div class="profile-section">
                    <h2>Profil</h2>
                    <div class="profile-info">
                        <p>Settings & options à venir...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- NAVBAR -->
    <nav class="navbar">
        <button class="nav-btn active" data-tab="home">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">Accueil</span>
        </button>
        <button class="nav-btn" data-tab="stories">
            <span class="nav-icon">✨</span>
            <span class="nav-label">Révélation</span>
        </button>
        <button class="nav-btn" data-tab="friends">
            <span class="nav-icon">👥</span>
            <span class="nav-label">Amis</span>
        </button>
        <button class="nav-btn" data-tab="more">
            <span class="nav-icon">⚙️</span>
            <span class="nav-label">Plus</span>
        </button>
    </nav>

    <!-- CAMERA BUTTON -->
    <button id="cameraBtn" class="btn-camera" style="display:none;">📷</button>
    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;">

    <!-- FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

    <!-- APP -->
    <script defer src="app.js"></script>
</body>
</html>
